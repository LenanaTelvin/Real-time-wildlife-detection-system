# render.yaml - Configuration for Render deployment
# Place this file in your project root directory

services:
  # Backend API Service
  - type: web
    name: wildlife-detection-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r ../requirements.txt
      # Download any necessary model files if needed
      # python -c "from ultralytics import YOLO; YOLO('best.pt')"
    startCommand: gunicorn app:app --workers 1 --worker-class eventlet --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: DATABASE_URL
        fromDatabase:
          name: wildlife-detection-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: RENDER
        value: true
        
        # ML API Configuration (your local tunnel)
      - key: ML_API_URL
        sync: false  # Set manually in Render dashboard (your ngrok URL)
      - key: ML_API_KEY
        sync: false  # Set manually if you added authentication
      - key: USE_LOCAL_ML
        value: true


        # in source code. Set these values in the Render dashboard under
      # Environment Variables, or use Render's Secret Files feature.
      - key: SMTP_EMAIL
        sync: false         # set manually in Render dashboard
      - key: SMTP_PASSWORD
        sync: false         # set manually in Render dashboard
      - key: RECEIVER_EMAIL
        sync: false         # set manually in Render dashboard
    disk:
      name: uploads
      mountPath: /tmp/uploads
      sizeGB: 10
    healthCheckPath: /api/health
    autoDeploy: true

  # Optional: Frontend Static Site (if you have a frontend)
  - type: static
    name: wildlife-detection-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://wildlife-detection-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# PostgreSQL Database
databases:
  - name: wildlife-detection-db
    databaseName: wildlife_db
    user: wildlife_user
    plan: free
    ipAllowList: []  # Only allow internal connections